name: 'mquire build'
description: 'Build and test mquire'

inputs:
  build_type:
    description: 'Build type (Debug or Release)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install and update Rust
      shell: bash
      run: |
        rustup update

        if [[ "${{ runner.os }}" == "Linux" ]]; then
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl
        fi

    - name: Select the Rust target
      id: target_parameter
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Linux" ]]; then
          echo "VALUE=--target x86_64-unknown-linux-musl" >> $GITHUB_OUTPUT
        fi

    - name: Setup the command line build arguments
      id: build_parameter
      shell: bash
      run: |
        if [[ "${INPUTS_BUILD_TYPE}" == "Release" ]]; then
          echo "VALUE=--release" >> $GITHUB_OUTPUT
        fi

      env:
        INPUTS_BUILD_TYPE: ${{ inputs.build_type }}

    - name: Build the project
      shell: bash
      env:
        RUST_BACKTRACE: 1
        STEPS_TARGET_PARAMETER_OUTPUTS_VALUE: ${{ steps.target_parameter.outputs.VALUE }}
        STEPS_BUILD_PARAMETER_OUTPUTS_VALUE: ${{ steps.build_parameter.outputs.VALUE }}

      run: |
        cargo build \
          ${STEPS_TARGET_PARAMETER_OUTPUTS_VALUE} \
          ${STEPS_BUILD_PARAMETER_OUTPUTS_VALUE}

    - name: Run the tests
      shell: bash
      env:
        RUST_BACKTRACE: 1
        STEPS_TARGET_PARAMETER_OUTPUTS_VALUE: ${{ steps.target_parameter.outputs.VALUE }}
        STEPS_BUILD_PARAMETER_OUTPUTS_VALUE: ${{ steps.build_parameter.outputs.VALUE }}

      run: |
        cargo test \
          --examples \
          ${STEPS_TARGET_PARAMETER_OUTPUTS_VALUE} \
          ${STEPS_BUILD_PARAMETER_OUTPUTS_VALUE}
