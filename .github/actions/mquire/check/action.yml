name: 'mquire check'
description: 'Run linting and formatting checks'

runs:
  using: 'composite'
  steps:
    - name: Install just
      shell: bash
      run: cargo install just

    - name: Install uv
      uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7

    - name: Install Python dependencies
      shell: bash
      working-directory: integration-tests/sql-queries/verifier
      run: uv sync --group dev

    - name: Run checks
      shell: bash
      run: just check
