name: CI

on:
  pull_request:
    branches:
      - '*'

  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Clone the source code
        uses: actions/checkout@v6

      - name: Run checks
        uses: ./.github/actions/mquire/check

  build:
    needs: [check]
    timeout-minutes: 30

    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            build_type: Release
          - os: ubuntu-24.04
            build_type: Debug
          - os: macos-15
            build_type: Release
          - os: windows-2022
            build_type: Release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Clone the source code
        uses: actions/checkout@v6

      - name: Build
        uses: ./.github/actions/mquire/build
        with:
          build_type: ${{ matrix.build_type }}

      - name: Build and upload packages
        if: ${{ matrix.build_type == 'Release' }}
        uses: ./.github/actions/mquire/package

  sql-queries:
    needs: [check, build]
    uses: ./.github/workflows/integration_sql-queries_main.yml
    secrets: inherit
