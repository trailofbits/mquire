name: Linux

on:
  pull_request:
    branches:
      - '*'

  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1

jobs:
  posix_check:
    strategy:
      matrix:
        runner_image: [ubuntu-24.04]
        build_type: [Debug]

    uses: ./.github/workflows/posix_check.yml
    secrets: inherit

    with:
      runner_image: ${{ matrix.runner_image }}
      build_type: ${{ matrix.build_type }}

  linux:
    needs: [posix_check]

    strategy:
      matrix:
        runner_image: [ubuntu-24.04]
        build_type: [Release, Debug]

    uses: ./.github/workflows/posix_build.yml
    secrets: inherit

    with:
      runner_image: ${{ matrix.runner_image }}
      build_type: ${{ matrix.build_type }}

  macos:
    needs: [posix_check]

    strategy:
      matrix:
        runner_image: [macos-15]
        build_type: [Release, Debug]

    uses: ./.github/workflows/posix_build.yml
    secrets: inherit

    with:
      runner_image: ${{ matrix.runner_image }}
      build_type: ${{ matrix.build_type }}
