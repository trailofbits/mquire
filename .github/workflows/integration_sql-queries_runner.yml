name: sql-queries-run

on:
  workflow_call:
    inputs:
      test_suite:
        required: true
        type: string
        description: "Test suite name (simple, examples)"

      config_file:
        required: true
        type: string
        description: "Path to config file relative to verifier dir (e.g., ../cfg/linux_simple.json)"

jobs:
  run:
    name: Integration Tests (${{ inputs.test_suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Download mquire binary
        uses: actions/download-artifact@v7
        with:
          name: mquire-binary
          path: target/release

      - name: Make binary executable
        run: chmod +x target/release/mquire

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install verifier dependencies
        working-directory: integration-tests/sql-queries/verifier
        run: uv sync

      - name: Run tests
        working-directory: integration-tests/sql-queries/verifier
        env:
          MQUIRE_TEST_S3_BUCKET: ${{ secrets.MQUIRE_TEST_S3_BUCKET }}
          MQUIRE_TEST_S3_ENDPOINT: ${{ secrets.MQUIRE_TEST_S3_ENDPOINT }}
          MQUIRE_TEST_AWS_ACCESS_KEY_ID: ${{ secrets.MQUIRE_TEST_AWS_ACCESS_KEY_ID }}
          MQUIRE_TEST_AWS_SECRET_ACCESS_KEY: ${{ secrets.MQUIRE_TEST_AWS_SECRET_ACCESS_KEY }}
        run: |
          uv run mquire-sql-query-verifier ${{ inputs.config_file }} \
            --junit-xml results-${{ inputs.test_suite }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results-${{ inputs.test_suite }}
          path: integration-tests/sql-queries/verifier/results-${{ inputs.test_suite }}.xml
          retention-days: 30
