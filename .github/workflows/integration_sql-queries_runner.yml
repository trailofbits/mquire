name: sql-queries-run

on:
  workflow_call:
    inputs:
      test_suite:
        required: true
        type: string
        description: "Test suite name (simple, examples)"

      config_file:
        required: true
        type: string
        description: "Path to config file relative to verifier dir (e.g., ../cfg/linux_simple.json)"

    secrets:
      MQUIRE_TEST_S3_BUCKET:
        required: true

      MQUIRE_TEST_S3_ENDPOINT:
        required: true

      MQUIRE_TEST_AWS_ACCESS_KEY_ID:
        required: true

      MQUIRE_TEST_AWS_SECRET_ACCESS_KEY:
        required: true

permissions: {}

jobs:
  run:
    name: Integration Tests (${{ inputs.test_suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: integration-tests

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download mquire package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: linux-x64-tgz
          path: .

      - name: Extract mquire binary
        run: |
          tar -xzf mquire-*.tar.gz
          mkdir -p target/release
          mv mquire-*/bin/mquire target/release/
          chmod +x target/release/mquire

      - name: Install just
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Install uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7
        with:
          version: "latest"

      - name: Install verifier dependencies
        working-directory: integration-tests/sql-queries/verifier
        run: uv sync

      - name: Install SQL views
        run: just install-views

      - name: Run tests
        working-directory: integration-tests/sql-queries/verifier
        env:
          MQUIRE_TEST_S3_BUCKET: ${{ secrets.MQUIRE_TEST_S3_BUCKET }}
          MQUIRE_TEST_S3_ENDPOINT: ${{ secrets.MQUIRE_TEST_S3_ENDPOINT }}
          MQUIRE_TEST_AWS_ACCESS_KEY_ID: ${{ secrets.MQUIRE_TEST_AWS_ACCESS_KEY_ID }}
          MQUIRE_TEST_AWS_SECRET_ACCESS_KEY: ${{ secrets.MQUIRE_TEST_AWS_SECRET_ACCESS_KEY }}
          INPUTS_CONFIG_FILE: ${{ inputs.config_file }}
          INPUTS_TEST_SUITE: ${{ inputs.test_suite }}
        run: |
          uv run mquire-sql-query-verifier ${INPUTS_CONFIG_FILE} \
            integration-tests_sql-queries_${INPUTS_TEST_SUITE}.xml

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: integration-tests_sql-queries_${{ inputs.test_suite }}
          path: integration-tests/sql-queries/verifier/integration-tests_sql-queries_${{ inputs.test_suite }}.xml
          retention-days: 30
