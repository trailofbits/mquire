name: sql-queries

on:
  workflow_call:

jobs:
  test-simple:
    uses: ./.github/workflows/integration_sql-queries_runner.yml
    secrets: inherit
    with:
      test_suite: simple
      config_file: ../cfg/linux_simple.json

  test-examples:
    uses: ./.github/workflows/integration_sql-queries_runner.yml
    secrets: inherit
    with:
      test_suite: examples
      config_file: ../cfg/linux_examples.json

  summary:
    name: Integration Test Summary
    needs: [test-simple, test-examples]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v7
        with:
          pattern: integration-tests_sql-queries_*
          merge-multiple: true

      - name: Check test results
        run: |
          echo "Integration Test Summary"

          FAILED=0

          for xml in *.xml; do
            if [ -f "$xml" ]; then
              echo "Checking $xml..."
              FAILURES=$(grep -o 'failures="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*')
              if [ "$FAILURES" != "0" ] && [ -n "$FAILURES" ]; then
                echo "  FAILED: $FAILURES failures"
                FAILED=1
              else
                echo "  PASSED"
              fi
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Some tests failed!"
            exit 1
          fi

          echo ""
          echo "All tests passed!"
