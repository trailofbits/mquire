name: sql-queries

on:
  workflow_call:
    secrets:
      MQUIRE_TEST_S3_BUCKET:
        required: true
      MQUIRE_TEST_S3_ENDPOINT:
        required: true
      MQUIRE_TEST_AWS_ACCESS_KEY_ID:
        required: true
      MQUIRE_TEST_AWS_SECRET_ACCESS_KEY:
        required: true

permissions: {}

jobs:
  test-simple:
    uses: ./.github/workflows/integration_sql-queries_runner.yml
    secrets:
      MQUIRE_TEST_S3_BUCKET: ${{ secrets.MQUIRE_TEST_S3_BUCKET }}
      MQUIRE_TEST_S3_ENDPOINT: ${{ secrets.MQUIRE_TEST_S3_ENDPOINT }}
      MQUIRE_TEST_AWS_ACCESS_KEY_ID: ${{ secrets.MQUIRE_TEST_AWS_ACCESS_KEY_ID }}
      MQUIRE_TEST_AWS_SECRET_ACCESS_KEY: ${{ secrets.MQUIRE_TEST_AWS_SECRET_ACCESS_KEY }}
    with:
      test_suite: simple
      config_file: ../cfg/linux_simple.json

  test-examples:
    uses: ./.github/workflows/integration_sql-queries_runner.yml
    secrets:
      MQUIRE_TEST_S3_BUCKET: ${{ secrets.MQUIRE_TEST_S3_BUCKET }}
      MQUIRE_TEST_S3_ENDPOINT: ${{ secrets.MQUIRE_TEST_S3_ENDPOINT }}
      MQUIRE_TEST_AWS_ACCESS_KEY_ID: ${{ secrets.MQUIRE_TEST_AWS_ACCESS_KEY_ID }}
      MQUIRE_TEST_AWS_SECRET_ACCESS_KEY: ${{ secrets.MQUIRE_TEST_AWS_SECRET_ACCESS_KEY }}
    with:
      test_suite: examples
      config_file: ../cfg/linux_examples.json

  test-views:
    uses: ./.github/workflows/integration_sql-queries_runner.yml
    secrets:
      MQUIRE_TEST_S3_BUCKET: ${{ secrets.MQUIRE_TEST_S3_BUCKET }}
      MQUIRE_TEST_S3_ENDPOINT: ${{ secrets.MQUIRE_TEST_S3_ENDPOINT }}
      MQUIRE_TEST_AWS_ACCESS_KEY_ID: ${{ secrets.MQUIRE_TEST_AWS_ACCESS_KEY_ID }}
      MQUIRE_TEST_AWS_SECRET_ACCESS_KEY: ${{ secrets.MQUIRE_TEST_AWS_SECRET_ACCESS_KEY }}
    with:
      test_suite: views
      config_file: ../cfg/linux_views.json

  summary:
    name: Integration Test Summary
    needs: [test-simple, test-examples, test-views]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          pattern: integration-tests_sql-queries_*
          merge-multiple: true

      - name: Check test results
        run: |
          echo "Integration Test Summary"

          FAILED=0

          for xml in *.xml; do
            if [ -f "$xml" ]; then
              echo "Checking $xml..."
              FAILURES=$(grep -o 'failures="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*')
              if [ "$FAILURES" != "0" ] && [ -n "$FAILURES" ]; then
                echo "  FAILED: $FAILURES failures"
                FAILED=1
              else
                echo "  PASSED"
              fi
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Some tests failed!"
            exit 1
          fi

          echo ""
          echo "All tests passed!"
