version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "rust"
    open-pull-requests-limit: 10
    groups:
      cargo-all:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/integration-tests/sql-queries/verifier"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    groups:
      python-all:
        patterns:
          - "*"
